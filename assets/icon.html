<!doctype html><html><head><meta charset="utf-8"><style>
  html,body{margin:0;padding:0;width:1024px;height:1024px;overflow:hidden}
</style></head><body>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#22456e"/>
      <stop offset="1" stop-color="#16263f"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#E0C56B"/>
      <stop offset="1" stop-color="#C9A84C"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="1024" height="1024" rx="228" ry="228" fill="url(#bg)"/>
  <!-- subtle ascending bars (ledger/growth) -->
  <g opacity="0.16" fill="#ffffff">
    <rect x="250" y="690" width="86" height="150" rx="20"/>
    <rect x="372" y="628" width="86" height="212" rx="20"/>
    <rect x="494" y="556" width="86" height="284" rx="20"/>
    <rect x="616" y="660" width="86" height="180" rx="20"/>
  </g>
  <!-- kr monogram -->
  <text x="512" y="468" text-anchor="middle"
        font-family="-apple-system, Helvetica Neue, Helvetica, Arial, sans-serif"
        font-size="430" font-weight="700" fill="url(#gold)"
        dominant-baseline="middle" letter-spacing="-8">kr</text>
</svg>
</body></html>
