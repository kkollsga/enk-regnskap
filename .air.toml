root = "."
tmp_dir = "tmp"

[build]
cmd = "go build -o ./tmp/enk-regnskap ./cmd/server"
bin = "./tmp/enk-regnskap"
full_bin = "./tmp/enk-regnskap -no-open"
include_ext = ["go", "html", "css", "js", "json", "sql"]
exclude_dir = ["dist", "tmp", "data", "testdata"]
delay = 500

[misc]
clean_on_exit = true
