name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Verify formatting
        run: test -z "$(gofmt -l internal cmd web)"
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./...

  build:
    name: Cross build
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
            out: enk-regnskap-windows.exe
          - goos: darwin
            goarch: arm64
            out: enk-regnskap-mac
          - goos: linux
            goarch: amd64
            out: enk-regnskap-linux
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build -o dist/${{ matrix.out }} ./cmd/server
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.out }}
          path: dist/${{ matrix.out }}
